<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>〇×クイズ</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
    }

    #question {
      font-size: 20px;
      margin-bottom: 20px;
    }

    .answer-btn {
      font-size: 24px;
      padding: 15px 30px;
      margin: 10px;
      cursor: pointer;
    }

    #result {
      font-size: 18px;
      margin-top: 20px;
    }

    #explanation {
      margin-top: 10px;
      color: #555;
    }

    #score {
      margin-top: 20px;
      font-weight: bold;
    }

    #nextButton {
      margin-top: 20px;
      padding: 10px 20px;
    }
  </style>
</head>

<body>

  <h1>〇×クイズ</h1>

  <p id="question">読み込み中...</p>

  <!-- 👇ここが〇×ボタン -->
  <div>
    <button class="answer-btn" onclick="answer('○')">○</button>
    <button class="answer-btn" onclick="answer('×')">×</button>
  </div>

  <p id="result"></p>
  <p id="explanation"></p>

  <p id="score">0問中 0問正解</p>

  <button id="nextButton">次の問題</button>

  <script src="app.js"></script>

</body>
</html>
